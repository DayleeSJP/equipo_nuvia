<section class="min-h-screen bg-[#F9F2EC] flex items-center justify-center px-6">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-[#1D1916]">Nuvia</h1>
            <p class="text-gray-600 mt-2">Ingresa a tu cuenta</p>
        </div>

        <form (ngSubmit)="login()" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Correo electrónico
                </label>
                <input type="email" name="email" [(ngModel)]="email" placeholder="correo@gmail.com"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C09C75]"
                    required />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Contraseña
                </label>
                <input type="password" name="password" [(ngModel)]="password" placeholder="Tu contraseña"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C09C75]"
                    required />
            </div>

            <p *ngIf="error" class="text-red-500 text-sm">
                {{ error }}
            </p>

            <p *ngIf="mensaje" class="text-green-600 text-sm">
                {{ mensaje }}
            </p>

            <button type="submit"
                class="w-full bg-[#C09C75] text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">
                Ingresar
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            ¿No tienes cuenta de cliente?
            <a routerLink="/registro-cliente" class="text-[#C09C75] font-semibold cursor-pointer">
                Regístrate
            </a>
        </p>
    </div>
</section>
